<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>OG · Saltify Academy</title>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700&family=JetBrains+Mono:wght@500;700&family=Playfair+Display:ital,wght@0,700;1,600&display=swap');
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
        width: 1200px; height: 630px;
        font-family: 'Inter', -apple-system, sans-serif;
        background: #0a0a0a;
        color: #f2f2f2;
        overflow: hidden;
    }
    .card {
        position: relative;
        width: 1200px;
        height: 630px;
        padding: 60px 80px;
        background:
            radial-gradient(circle at 80% 0%, rgba(6, 182, 212, 0.18) 0%, transparent 50%),
            linear-gradient(180deg, #0e1a1d 0%, #161616 70%, #0a0a0a 100%);
        display: flex;
        flex-direction: column;
        justify-content: space-between;
    }
    /* corner brackets */
    .corner {
        position: absolute; width: 36px; height: 36px;
        border: 0 solid #06b6d4; opacity: 0.7;
    }
    .corner.tl { top: 28px; left: 28px;  border-top-width: 3px; border-left-width: 3px; }
    .corner.tr { top: 28px; right: 28px; border-top-width: 3px; border-right-width: 3px; }
    .corner.bl { bottom: 28px; left: 28px; border-bottom-width: 3px; border-left-width: 3px; }
    .corner.br { bottom: 28px; right: 28px; border-bottom-width: 3px; border-right-width: 3px; }
    .top {
        display: flex; align-items: center; gap: 12px;
    }
    .brand {
        font-weight: 700; font-size: 1.25rem; letter-spacing: -0.02em;
    }
    .brand .pty { color: #888888; font-weight: 500; margin-left: 6px; font-size: 0.95rem; }
    .eyebrow {
        font-family: 'JetBrains Mono', monospace;
        font-size: 0.85rem; font-weight: 700; letter-spacing: 0.22em;
        text-transform: uppercase; color: #06b6d4;
        display: inline-flex; align-items: center; gap: 12px;
        padding: 8px 16px; border: 1px solid rgba(6, 182, 212, 0.3);
        background: rgba(6, 182, 212, 0.04);
        border-radius: 999px;
    }
    .center { display: flex; flex-direction: column; align-items: flex-start; gap: 24px; }
    .title {
        font-family: 'Playfair Display', 'Times New Roman', serif;
        font-weight: 700; font-size: 5.4rem; line-height: 1.02;
        letter-spacing: -0.01em; color: #f2f2f2;
    }
    .title em {
        font-style: italic; color: #06b6d4; font-weight: 600;
    }
    .rule {
        width: 88px; height: 1px;
        background: rgba(6, 182, 212, 0.45);
        position: relative;
    }
    .rule::before, .rule::after {
        content: ''; position: absolute; top: 50%; transform: translateY(-50%);
        width: 8px; height: 8px; background: #06b6d4; border-radius: 50%;
    }
    .rule::before { left: -16px; }
    .rule::after { right: -16px; }
    .tagline {
        font-size: 1.5rem; color: #f2f2f2; font-weight: 500;
        letter-spacing: -0.005em;
    }
    .stats {
        display: flex; gap: 28px; align-items: center;
        font-family: 'JetBrains Mono', monospace;
        font-size: 1rem; color: #888888;
        font-weight: 500; letter-spacing: 0.02em;
    }
    .stats strong { color: #06b6d4; font-weight: 700; margin-right: 6px; }
    .stats .sep { color: #444; }
    .bottom {
        display: flex; justify-content: space-between; align-items: flex-end;
        font-family: 'JetBrains Mono', monospace; font-size: 1rem;
        color: #888888;
    }
    .bottom .url { letter-spacing: 0.02em; }
    .bottom .url strong { color: #f2f2f2; font-weight: 700; }
    .hex {
        font-size: 1.5rem; color: #06b6d4; opacity: 0.6;
    }
</style>
</head>
<body>
<div class="card">
    <span class="corner tl"></span>
    <span class="corner tr"></span>
    <span class="corner bl"></span>
    <span class="corner br"></span>

    <div class="top">
        <span class="hex">⬡</span>
        <span class="brand">Saltify <span class="pty">· Academy</span></span>
    </div>

    <div class="center">
        <span class="eyebrow"><span>⬡</span> Free curriculum · No sign-up</span>
        <h1 class="title">Saltify <em>Academy</em></h1>
        <div class="rule"></div>
        <p class="tagline">Learn Salt the Saltify way.</p>
        <div class="stats">
            <span><strong>8</strong>free guides</span><span class="sep">·</span>
            <span><strong>360</strong>state modules</span><span class="sep">·</span>
            <span><strong>0</strong>sign-ups</span>
        </div>
    </div>

    <div class="bottom">
        <span class="url"><strong>saltify.work</strong>/salt-academy.html</span>
        <span>SALT 101 → 401 · 501 · REF 01–02</span>
    </div>
</div>
</body>
</html>
