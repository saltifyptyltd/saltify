<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>OG · Salt Academy</title>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap');
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
        width: 1200px; height: 630px;
        font-family: 'Inter', -apple-system, sans-serif;
        background: #0a0a0a;
        color: #f2f2f2;
        overflow: hidden;
    }
    .card {
        position: relative;
        width: 1200px; height: 630px;
        padding: 56px 80px;
        background:
            radial-gradient(circle at 78% 0%, rgba(6, 182, 212, 0.20) 0%, transparent 55%),
            linear-gradient(180deg, #0e1a1d 0%, #161616 70%, #0a0a0a 100%);
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        align-items: center;
        text-align: center;
    }
    .top-strip {
        align-self: flex-start;
        display: flex; align-items: center; gap: 8px;
        font-family: 'JetBrains Mono', monospace;
        font-size: 0.95rem;
        font-weight: 700;
        letter-spacing: 0.02em;
        color: #f2f2f2;
    }
    .top-strip .hex { color: #06b6d4; font-size: 1.1rem; }
    .top-strip .pty-suffix {
        color: #888888;
        font-weight: 500;
        font-size: 0.85rem;
    }
    .center {
        display: flex; flex-direction: column; align-items: center; gap: 26px;
        max-width: 940px;
    }
    .eyebrow {
        font-family: 'JetBrains Mono', monospace;
        font-size: 0.9rem; font-weight: 700; letter-spacing: 0.22em;
        text-transform: uppercase; color: #06b6d4;
        display: inline-flex; align-items: center; gap: 10px;
        padding: 10px 20px;
        border: 1px solid rgba(6, 182, 212, 0.35);
        background: rgba(6, 182, 212, 0.05);
        border-radius: 999px;
    }
    .eyebrow .hex { font-size: 1rem; }
    .title {
        font-family: 'Inter', -apple-system, sans-serif;
        font-weight: 700;
        font-size: 5.6rem;
        line-height: 1.02;
        letter-spacing: -0.028em;
        color: #f2f2f2;
    }
    .lead {
        font-size: 1.4rem;
        line-height: 1.45;
        color: #a8a8a8;
        font-weight: 400;
        max-width: 820px;
    }
    .lead code {
        font-family: 'JetBrains Mono', monospace;
        font-size: 0.92em;
        color: #06b6d4;
        background: rgba(6, 182, 212, 0.08);
        padding: 0.1em 0.35em;
        border-radius: 4px;
    }
    .lead strong { color: #f2f2f2; font-weight: 600; }
    .stats {
        display: flex; gap: 64px; align-items: center;
        margin-top: 4px;
    }
    .stats > div {
        display: flex; flex-direction: column; align-items: center; gap: 6px;
    }
    .stats .num {
        font-family: 'JetBrains Mono', monospace;
        font-size: 2.6rem;
        font-weight: 700;
        color: #06b6d4;
        line-height: 1;
    }
    .stats .lbl {
        font-family: 'JetBrains Mono', monospace;
        font-size: 0.78rem;
        color: #888888;
        text-transform: uppercase;
        letter-spacing: 0.14em;
    }
    .bottom-strip {
        align-self: stretch;
        display: flex; justify-content: space-between; align-items: flex-end;
        font-family: 'JetBrains Mono', monospace;
        font-size: 0.95rem;
        color: #888888;
    }
    .bottom-strip .url strong { color: #f2f2f2; font-weight: 700; }
</style>
</head>
<body>
<div class="card">
    <div class="top-strip">
        <span class="hex">⬡</span><span>Saltify</span><span class="pty-suffix">Pty Ltd</span>
    </div>

    <div class="center">
        <span class="eyebrow"><span class="hex">⬡</span> The curriculum</span>
        <h1 class="title">Salt Academy.</h1>
        <p class="lead">Eight guides. From your first <code>salt-call</code> to the AI-augmented dev workflow. <strong>The course we wish we had.</strong></p>
        <div class="stats">
            <div><span class="num">8</span><span class="lbl">guides</span></div>
            <div><span class="num">127</span><span class="lbl">modules</span></div>
            <div><span class="num">5</span><span class="lbl">courses</span></div>
        </div>
    </div>

    <div class="bottom-strip">
        <span class="url"><strong>saltify.work</strong>/salt-academy.html</span>
        <span>SALT 101–401 · 501 · REF 01–02</span>
    </div>
</div>
</body>
</html>
